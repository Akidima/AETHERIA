<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="description" content="Transform your emotions into living digital art. Powered by AI, visualized through WebGL.">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aetheria">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-TileColor" content="#050505">
    <meta name="msapplication-tap-highlight" content="no">
    <title>Aetheria | Digital Sentience</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <style>
      body {
        background-color: #050505;
        color: #f0f0f0;
        overflow-x: hidden;
        cursor: none;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    // Register service worker for PWA with enhanced features
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then(reg => {
            console.log('SW registered:', reg.scope);
            
            // Check for updates
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New update available
                    console.log('New SW update available');
                    if (window.confirm('A new version of Aetheria is available. Refresh to update?')) {
                      newWorker.postMessage({ type: 'skip-waiting' });
                      window.location.reload();
                    }
                  }
                });
              }
            });

            // Register periodic background sync for reminders
            if ('periodicSync' in reg) {
              reg.periodicSync.register('checkin-reminder', {
                minInterval: 24 * 60 * 60 * 1000,
              }).catch(err => console.log('Periodic sync not available:', err));
            }
          })
          .catch(err => console.log('SW registration failed:', err));

        // Listen for messages from service worker
        navigator.serviceWorker.addEventListener('message', event => {
          if (event.data?.type === 'sync-complete') {
            console.log('Background sync complete');
          }
        });
      });
    }
  </script>
</body>
</html>
